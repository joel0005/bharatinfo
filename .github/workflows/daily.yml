name: BharatInfo Daily Digest

on:
  schedule:
    # IST = UTC+5:30
    # 5:00 AM IST  = 23:30 UTC (previous day)
    # 10:00 AM IST = 04:30 UTC
    # 12:00 PM IST = 06:30 UTC
    # 4:00 PM IST  = 10:30 UTC
    # 6:00 PM IST  = 12:30 UTC
    # 9:00 PM IST  = 15:30 UTC
    - cron: "30 23 * * *"
    - cron: "30 4 * * *"
    - cron: "30 6 * * *"
    - cron: "30 10 * * *"
    - cron: "30 12 * * *"
    - cron: "30 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch news
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python fetch_news.py

      - name: Commit & push updated digest
        run: |
          git config user.name  "BharatInfo Bot"
          git config user.email "bot@bharatinfo.in"
          git add docs/today.json docs/*.json
          git diff --cached --quiet || git commit -m "📰 Digest update – $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M IST')"
          git push
