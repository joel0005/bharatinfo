name: BharatInfo Daily Digest

on:
  schedule:
    - cron: "30 0 * * *"
    - cron: "30 7 * * *"
    - cron: "30 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch news
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python fetch_news.py

      - name: Commit & push
        run: |
          git config user.name  "BharatInfo Bot"
          git config user.email "bot@bharatinfo.in"
          git add docs/today.json docs/*.json
          git diff --cached --quiet || git commit -m "📰 Digest – $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M IST')"
          git push
